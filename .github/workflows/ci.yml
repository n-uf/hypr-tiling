name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: build / api:check / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first so api:check has the emitted dist/index.d.ts to analyze,
      # and so the web prerender step runs.
      - name: Build (packages + web, incl. prerender)
        run: pnpm build

      # API Extractor gate — runs all THREE entry configs
      # (api-extractor.{index,devtools,engine}.json). Fails if any checked-in
      # report is out of date; the strict `.` config additionally fails if an
      # engine-grade type leaks onto the public entry (ae-forgotten-export) or a
      # public symbol lacks a doc summary (ae-undocumented) — both `error`.
      - name: API Extractor leak + TSDoc-coverage gate (index + devtools + engine)
        run: pnpm --filter @n-uf/hypr-tiling api:check

      # Architectural guardrails: engine↛react layering, no deep consumer
      # imports of @n-uf/hypr-tiling internals, and the built dist/index.mjs
      # facade keeps its `use client` directive (App Router consumers rely on it).
      # Runs after build so the dist assertion has an artifact.
      - name: Architectural guardrails (layering + use-client)
        run: pnpm --filter @n-uf/hypr-tiling check:guardrails

      # Generated API reference must not drift from the source TSDoc: regenerate
      # and fail on any diff to the committed snapshot.
      - name: API docs snapshot up to date
        run: |
          pnpm --filter @n-uf/hypr-tiling api:docs
          git diff --exit-code -- apps/web/src/api-reference/generated.ts

      - name: Typecheck (packages + web)
        run: pnpm typecheck

      - name: Test suite
        run: pnpm test
