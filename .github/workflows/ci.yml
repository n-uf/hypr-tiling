name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: build / api:check / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first so api:check has the emitted dist/index.d.ts to analyze,
      # and so the web prerender step runs.
      - name: Build (packages + web, incl. prerender)
        run: pnpm build

      # API Extractor leak + TSDoc-coverage gate: fails if the checked-in report
      # is out of date, if an @internal symbol leaks back onto the public entry
      # point, OR if any public symbol lacks a doc summary (ae-undocumented is
      # set to `error` in api-extractor.json).
      - name: API Extractor leak + TSDoc-coverage gate
        run: pnpm --filter @n-uf/hypr-tiling api:check

      # Generated API reference must not drift from the source TSDoc: regenerate
      # and fail on any diff to the committed snapshot.
      - name: API docs snapshot up to date
        run: |
          pnpm --filter @n-uf/hypr-tiling api:docs
          git diff --exit-code -- apps/web/src/api-reference/generated.ts

      - name: Typecheck (packages + web)
        run: pnpm typecheck

      - name: Test suite
        run: pnpm test
