<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <!-- Dark base wash: top slate sinking to near-black, the neon-terminal canvas. -->
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10141c"/>
      <stop offset="0.55" stop-color="#0b0e15"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>

    <!-- Cyan top glow: the only hint of neon, kept very faint so panes win. -->
    <radialGradient id="topGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 70) rotate(90) scale(560 1320)">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <!-- Violet counter-glow bottom-left for a subtle two-tone terminal depth. -->
    <radialGradient id="cornerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 1010) rotate(-38) scale(620 620)">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <!-- 40px minor grid: the fine technical lattice. -->
    <pattern id="minorGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#7dd3fc" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <!-- 200px major grid: heavier section rules over the minor lattice. -->
    <pattern id="majorGrid" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M200 0H0V200" fill="none" stroke="#a5f3fc" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <!-- Dot-matrix at every minor intersection: the deliberate terminal-grid signature. -->
    <pattern id="dotMatrix" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1" fill="#67e8f9" fill-opacity="0.11"/>
    </pattern>

    <!-- Low-amplitude monochrome grain to break up banding (kept barely-there). -->
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="11" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.025"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#base)"/>
  <rect width="1920" height="1080" fill="url(#minorGrid)"/>
  <rect width="1920" height="1080" fill="url(#majorGrid)"/>
  <rect width="1920" height="1080" fill="url(#dotMatrix)"/>
  <rect width="1920" height="1080" fill="url(#topGlow)"/>
  <rect width="1920" height="1080" fill="url(#cornerGlow)"/>
  <rect width="1920" height="1080" filter="url(#grain)"/>
</svg>
