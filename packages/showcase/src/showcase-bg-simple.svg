<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141820"/>
      <stop offset="1" stop-color="#090b10"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 120) rotate(90) scale(520 1200)">
      <stop offset="0" stop-color="#2A2F3A" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#2A2F3A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottomGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 1080) rotate(90) scale(420 1100)">
      <stop offset="0" stop-color="#1F242D" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#1F242D" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#base)"/>
  <rect width="1920" height="1080" fill="url(#topGlow)"/>
  <rect width="1920" height="1080" fill="url(#bottomGlow)"/>
  <rect width="1920" height="1080" filter="url(#grain)"/>
</svg>
