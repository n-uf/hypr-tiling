<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c0d0f" />
    <!--app-head-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              display: ["Fraunces", "ui-serif", "Georgia", "serif"],
              mono: ["JetBrains Mono", "ui-monospace", "SFMono-Regular", "monospace"],
            },
          },
        },
      };
    </script>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
        background-color: #0c0d0f;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      /* Mosaic motion: a single considered entrance for the shell, plus a
         staggered settle for panes. Everything is disabled under
         prefers-reduced-motion. */
      @keyframes mosaic-rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .mosaic-rise {
        animation: mosaic-rise 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) both;
      }
      @media (prefers-reduced-motion: reduce) {
        .mosaic-rise {
          animation: none;
        }
        * {
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body class="m-0 text-stone-100">
    <div id="root" class="min-h-screen"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
